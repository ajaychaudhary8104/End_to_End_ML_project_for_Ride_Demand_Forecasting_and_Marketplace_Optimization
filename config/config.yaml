artifacts_root: artifacts


data_ingestion:
  root_dir: artifacts/data_ingestion
  source_URL: https://github.com/ajaychaudhary8104/Datasets/raw/refs/heads/main/ride_marketplace.zip
  local_data_file: artifacts/data_ingestion/data.zip
  unzip_dir: artifacts/data_ingestion

data_validation:

  root_dir: artifacts/data_validation

  unzip_data_dir: artifacts/data_ingestion

  STATUS_FILE: artifacts/data_validation/status.txt

  REPORT_FILE: artifacts/data_validation/validation_report.json

  STATS_REPORT_FILE: artifacts/data_validation/dataset_statistics.json

  DRIFT_REPORT_FILE: artifacts/data_validation/drift_report.json

data_preprocessing:

  root_dir: artifacts/data_preprocessing

  input_data_path: artifacts/data_ingestion

  output_data_path: artifacts/data_preprocessing/preprocessed_rides.parquet

  preprocessing_report_path: artifacts/data_preprocessing/preprocessing_report.json

  outlier_method: iqr

  outlier_iqr_multiplier: 1.5

  numerical_imputation_method: median

  categorical_imputation_method: mode

  optimize_memory: true

  save_format: parquet    

feature_engineering:

  root_dir: artifacts/feature_engineering

  input_data_path: artifacts/data_preprocessing/preprocessed_rides.parquet

  output_data_path: artifacts/feature_engineering/featured_data.parquet

  feature_report_path: artifacts/feature_engineering/feature_report.json 

  original_feature_count: 45  

feature_store:

  root_dir: artifacts/feature_store
  
  feature_columns_path: config/feature_columns.yaml

  feature_repo_path: src/ride_demand_forecasting_and_marketplace_optimization/feature_repo

  offline_feature_path: artifacts/feature_engineering/featured_data.parquet

  registry_path: src/ride_demand_forecasting_and_marketplace_optimization/feature_repo/registry.db

  online_store_path: src/ride_demand_forecasting_and_marketplace_optimization/feature_repo/online_store.db

  feature_store_yaml_path: src/ride_demand_forecasting_and_marketplace_optimization/feature_repo/feature_store.yaml

  project_name: ride_marketplace_forecasting

  feature_view_name: ride_marketplace_features

  feature_service_name: forecast_service

  entity_name: zone_timestamp

  join_key: zone_timestamp_key

  timestamp_column: timestamp

  start_date: 2022-12-01-T00:00:00

  end_date: 2022-12-31-T23:59:59 

data_transformation:

  root_dir: artifacts/data_transformation

  feature_repo_path: src/ride_demand_forecasting_and_marketplace_optimization/feature_repo

  feature_engineered_data_path: artifacts/feature_engineering/featured_data.parquet

  feature_service_name: forecast_service

  target_column: ride_requests

  train_size: 0.70

  validation_size: 0.15

  test_size: 0.15

  enable_feature_selection: False

  num_selected_features: 200

  split_artifacts_dir: artifacts/data_transformation/splits

  train_file_path: artifacts/data_transformation/splits/train.parquet

  validation_file_path: artifacts/data_transformation/splits/validation.parquet

  test_file_path: artifacts/data_transformation/splits/test.parquet

  preprocessor_path: artifacts/data_transformation/preprocessor.pkl

  feature_selector_path: artifacts/data_transformation/feature_selector.pkl

  feature_names_path: artifacts/data_transformation/feature_names.pkl

  selected_features_path: artifacts/data_transformation/selected_features.pkl

  metadata_path: artifacts/data_transformation/metadata.json   

model_training:
  root_dir: artifacts/model_training
  train_file_path: artifacts/data_transformation/splits/train.parquet
  validation_file_path: artifacts/data_transformation/splits/validation.parquet
  model_file_path: artifacts/model_training/xgboost_model.pkl
  metrics_file_path: artifacts/model_training/model_metrics.json
  target_column: ride_requests   

model_evaluation:
  root_dir: artifacts/model_evaluation
  test_data_path: artifacts/data_transformation/splits/test.parquet
  model_path: artifacts/model_training/xgboost_model.pkl
  metric_file_name: artifacts/model_evaluation/model_evaluation_metrics.json
  target_column: ride_requests
  mlflow_uri: https://dagshub.com/ajaychaudhary8104/End_to_End_ML_project_for_Ride_Demand_Forecasting_and_Marketplace_Optimization.mlflow  
  experiment_name: ride_demand_forecasting_and_marketplace_optimization

model_promotion:
  root_dir: artifacts/model_promotion
  metrics_file_path: artifacts/model_evaluation/model_evaluation_metrics.json
  model_file_path: artifacts/model_training/xgboost_model.pkl
  production_model_path: artifacts/model_promotion/production_model.pkl
  registered_model_name: RideForecastingModel
  target_stage: Production
  mlflow_uri: https://dagshub.com/ajaychaudhary8104/End_to_End_ML_project_for_Ride_Demand_Forecasting_and_Marketplace_Optimization.mlflow
  promote_metric: wape
  promote_threshold: 10.0
  archive_existing_versions: true
  copy_local_model: true  

model_inference:
  root_dir: artifacts/inference
  feature_repo_path: src/ride_demand_forecasting_and_marketplace_optimization/feature_repo
  feature_service_name: forecast_service
  model_path: deployment/production_model.pkl
  input_data_path: inference_sample/inference.parquet
  prediction_output_path: artifacts/inference/predictions.csv
  target_column: ride_requests
  preprocessor_path: deployment/preprocessor.pkl