    surge_x_demand: Float32
    surge_x_traffic: Float32

    avg_fare: Float32
    avg_tip: Float32
    revenue: Float32

    revenue_per_request: Float32
    revenue_per_driver: Float32
    tip_percentage: Float32

    avg_trip_distance: Float32
    avg_trip_duration: Float32

    traffic_index: Float32
    traffic_x_demand: Float32
    traffic_pressure: Float32

    temperature: Float32
    feels_like: Float32
    humidity: Float32
    pressure: Float32
    visibility: Float32
    rainfall: Float32
    snowfall: Float32
    wind_speed: Float32

    temperature_deviation: Float32
    rain_intensity: Float32
    weather_severity_score: Float32

    holiday_flag: Int32
    concert_flag: Int32
    sports_event_flag: Int32
    festival_flag: Int32

    any_event: Int32
    event_intensity: Int32

    fuel_price: Float32
    cpi: Float32
    unemployment_rate: Float32

    fuel_cpi_ratio: Float32
    economic_stress: Float32

    borough_avg_demand: Float32
    zone_avg_demand: Float32

    ride_requests_lag_1: Float32
    ride_requests_lag_2: Float32
    ride_requests_lag_3: Float32
    ride_requests_lag_6: Float32
    ride_requests_lag_12: Float32
    ride_requests_lag_24: Float32
    ride_requests_lag_168: Float32

    active_drivers_lag_1: Float32
    active_drivers_lag_24: Float32

