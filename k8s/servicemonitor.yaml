apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ride-demand-api
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: ride-demand-api

  namespaceSelector:
    matchNames:
      - default

  endpoints:
    - port: http
      path: /metrics
      interval: 15s