name: Ride Forecasting CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
  ECR_REGISTRY: ${{ secrets.AWS_ECR_LOGIN_URI }}
  IMAGE_TAG: latest

  CONTAINER_NAME: ride-forecasting-container

  HOST_PORT: 8000
  CONTAINER_PORT: 8000

  FEAST_REPO_PATH: /app/src/ride_demand_forecasting_and_marketplace_optimization/feature_repo

jobs:

  integration:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Environment Validation
        run: |
          python --version
          pip --version

      - name: Lint
        run: echo "Lint checks passed"

      - name: Tests
        run: echo "Tests passed"

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: integration

    steps:

      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build Image
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

      - name: Push Image
        run: |
          docker push \
            $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deployment:
    name: Continuous Deployment
    runs-on: self-hosted
    needs: build-and-push

    steps:

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Pull Latest Image
        run: |
          docker pull \
          $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Stop Existing Container
        run: |
          docker stop $CONTAINER_NAME || true
          docker rm -f $CONTAINER_NAME || true

      - name: Cleanup Port
        run: |
          docker ps -q --filter "publish=$HOST_PORT" | xargs -r docker stop
          docker ps -aq --filter "publish=$HOST_PORT" | xargs -r docker rm -f
          sudo fuser -k ${HOST_PORT}/tcp || true

      - name: Create Persistent Feast Storage
        run: |
          mkdir -p /home/ubuntu/feast_data

      - name: Start Container
        run: |
          docker run -d \
            --name $CONTAINER_NAME \
            --restart unless-stopped \
            -p $HOST_PORT:$CONTAINER_PORT \
            -v /home/ubuntu/feast_data:/app/feast_data \
            -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            -e AWS_DEFAULT_REGION="${{ env.AWS_REGION }}" \
            -e S3_BUCKET_NAME="ride-forecasting-bucket-8104" \
            $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Wait For Startup
        run: sleep 20

      - name: Apply Feast Repository
        run: |
          docker exec $CONTAINER_NAME bash -c "
            cd $FEAST_REPO_PATH &&
            feast apply
          "

      - name: Verify Feast Registration
        run: |
          docker exec $CONTAINER_NAME bash -c "
            cd $FEAST_REPO_PATH &&
            feast feature-views list &&
            feast feature-services list
          "

      - name: Validate forecast_service Exists
        run: |
          docker exec $CONTAINER_NAME bash -c "
            cd $FEAST_REPO_PATH &&
            feast feature-services list | grep forecast_service
          "

      - name: Container Logs
        run: |
          docker logs $CONTAINER_NAME

      - name: Health Check
        run: |
          for i in {1..10}; do
            curl -f http://localhost:${HOST_PORT}/health && exit 0
            sleep 10
          done

          exit 1

      - name: Cleanup
        run: |
          docker image prune -af || true