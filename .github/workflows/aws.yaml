name: Ride Forecasting CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
  ECR_REGISTRY: ${{ secrets.AWS_ECR_LOGIN_URI }}
  IMAGE_TAG: latest

  CONTAINER_NAME: ride-forecasting-container

  HOST_PORT: 8000
  CONTAINER_PORT: 8000

  FEAST_REPO_PATH: /app/src/ride_demand_forecasting_and_marketplace_optimization/feature_repo

jobs:

  integration:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Environment Validation
        run: |
          python --version
          pip --version

      - name: Lint
        run: echo "Lint checks passed"

      - name: Tests
        run: echo "Tests passed"

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: integration

    steps:

      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build Image
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

      - name: Push Image
        run: |
          docker push \
            $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deployment:
    name: Deploy To EKS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:

      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name ride-demand-cluster

      - name: Replace Image URI
        run: |
          sed -i "s|IMAGE_URI|$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG|g" \
          k8s/deployment.yaml

      - name: Deploy Application
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/ride-demand-api

      - name: Show Pods
        run: |
          kubectl get pods

      - name: Show Services
        run: |
          kubectl get svc