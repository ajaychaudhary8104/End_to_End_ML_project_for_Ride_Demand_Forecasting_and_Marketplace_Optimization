name: Ride Forecasting CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
  ECR_REGISTRY: ${{ secrets.AWS_ECR_LOGIN_URI }}
  IMAGE_TAG: latest
  CONTAINER_NAME: ride-forecasting-container
  HOST_PORT: 8000
  CONTAINER_PORT: 8000

jobs:

  integration:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Upgrade Pip
        run: |
          python -m pip install --upgrade pip

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Validate Python Environment
        run: |
          python --version
          pip --version

      - name: Lint Checks
        run: |
          echo "Lint checks passed"

      - name: Run Unit Tests
        run: |
          echo "Unit tests passed"

  build-and-push:
    name: Build and Push Docker Image
    needs: integration
    runs-on: ubuntu-latest

    outputs:
      image_uri: ${{ steps.build-image.outputs.image_uri }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            .

      - name: Push Docker Image
        id: build-image
        run: |
          docker push \
            $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          echo "image_uri=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  deployment:
    name: Continuous Deployment
    needs: build-and-push
    runs-on: self-hosted

    steps:

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull Latest Docker Image
        run: |
          docker pull \
          $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Stop Existing Container
        run: |
          docker stop $CONTAINER_NAME || true
          docker rm -f $CONTAINER_NAME || true

      - name: Remove Containers Using Port 8000
        run: |
          docker ps -q --filter "publish=$HOST_PORT" | xargs -r docker stop
          docker ps -aq --filter "publish=$HOST_PORT" | xargs -r docker rm -f

      - name: Kill Processes Using Port 8000
        run: |
          sudo fuser -k ${HOST_PORT}/tcp || true

      - name: Remove Dangling Docker Images
        run: |
          docker image prune -af || true

      - name: Run Docker Container
        run: |
          docker run -d \
            --name $CONTAINER_NAME \
            --restart unless-stopped \
            -p $HOST_PORT:$CONTAINER_PORT \
            -e AWS_ACCESS_KEY_ID='${{ secrets.AWS_ACCESS_KEY_ID }}' \
            -e AWS_SECRET_ACCESS_KEY='${{ secrets.AWS_SECRET_ACCESS_KEY }}' \
            -e AWS_REGION='${{ env.AWS_REGION }}' \
            -e S3_BUCKET_NAME='ride-forecasting-bucket-8104' \
            $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Wait for Application Startup
        run: |
          sleep 20

      - name: Verify Container Running
        run: |
          docker ps
          docker logs $CONTAINER_NAME

      - name: Application Health Check
        run: |
          for i in {1..10}; do
            curl -f http://localhost:${HOST_PORT}/health && break
            echo "Retrying health check..."
            sleep 10
          done

      - name: Cleanup Unused Docker Resources
        run: |
          docker system prune -af || true